backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pagine del Sito"
    files:
      - file: "content/homepage.md"
        label: "Homepage"
        name: "homepage"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Sottotitolo", name: "subtitle", widget: "string"}
          - {label: "Descrizione", name: "description", widget: "text"}
          - {label: "Immagine Hero", name: "hero_image", widget: "image"}
          - {label: "CTA Principale", name: "cta_text", widget: "string"}
          - {label: "Link CTA", name: "cta_link", widget: "string"}
          - {label: "Contenuto", name: "content", widget: "markdown"}

      - file: "content/noleggio-barche.md"
        label: "Noleggio Barche"
        name: "noleggio_barche"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Descrizione", name: "description", widget: "text"}
          - {label: "Prezzo Base", name: "price", widget: "string"}
          - {label: "Immagine", name: "image", widget: "image"}
          - {label: "Servizi Inclusi", name: "services", widget: "list"}
          - {label: "Contenuto", name: "content", widget: "markdown"}

      - file: "content/noleggio-gommoni.md"
        label: "Noleggio Gommoni"
        name: "noleggio_gommoni"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Descrizione", name: "description", widget: "text"}
          - {label: "Prezzo Base", name: "price", widget: "string"}
          - {label: "Immagine", name: "image", widget: "image"}
          - {label: "Servizi Inclusi", name: "services", widget: "list"}
          - {label: "Contenuto", name: "content", widget: "markdown"}

      - file: "content/escursioni.md"
        label: "Escursioni Egadi"
        name: "escursioni"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Descrizione", name: "description", widget: "text"}
          - {label: "Isole Visitate", name: "islands", widget: "list"}
          - {label: "Durata", name: "duration", widget: "string"}
          - {label: "Prezzo", name: "price", widget: "string"}
          - {label: "Immagine", name: "image", widget: "image"}
          - {label: "Contenuto", name: "content", widget: "markdown"}

      - file: "content/faq.md"
        label: "FAQ"
        name: "faq"
        fields:
          - {label: "Titolo Pagina", name: "page_title", widget: "string"}
          - {label: "FAQ", name: "faqs", widget: "list", fields: [
              {label: "Domanda", name: "question", widget: "string"},
              {label: "Risposta", name: "answer", widget: "text"}
            ]}

      - file: "content/contatti.md"
        label: "Contatti"
        name: "contatti"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Telefono", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Indirizzo", name: "address", widget: "string"}
          - {label: "Orari di Apertura", name: "hours", widget: "text"}
          - {label: "Contenuto", name: "content", widget: "markdown"}

  - name: "settings"
    label: "Impostazioni Sito"
    files:
      - file: "content/site-settings.md"
        label: "Impostazioni Generali"
        name: "site_settings"
        fields:
          - {label: "Nome Azienda", name: "company_name", widget: "string"}
          - {label: "Logo", name: "logo", widget: "image"}
          - {label: "Descrizione Sito", name: "site_description", widget: "text"}
          - {label: "Telefono Principale", name: "main_phone", widget: "string"}
          - {label: "Email Principale", name: "main_email", widget: "string"}
          - {label: "Indirizzo", name: "address", widget: "string"}
          - {label: "Coordinate GPS", name: "gps_coords", widget: "string"}
          - {label: "Rating Google", name: "rating", widget: "string"}
          - {label: "Numero Recensioni", name: "review_count", widget: "string"}
