<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata | Stella Marina Favignana</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ocean:#0a3d5c;--sky:#1a7fa8;--teal:#00b5c8;--night:#040f1a;--green:#22c55e}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--night);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(3rem,10vw,7rem);color:var(--teal);line-height:1}
    h2{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.3rem,4vw,2rem);margin:.75rem 0 1rem;font-weight:700}
    p{color:rgba(255,255,255,.65);font-size:1rem;max-width:420px;line-height:1.7;margin-bottom:2rem}
    .btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
    a.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.6rem;border-radius:100px;font-weight:600;font-size:.95rem;text-decoration:none;transition:all .2s}
    a.btn-primary{background:var(--teal);color:#fff}
    a.btn-primary:hover{background:var(--sky)}
    a.btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
    a.btn-secondary:hover{background:rgba(255,255,255,.18)}
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Pagina non trovata</h2>
  <p>La pagina che cerchi non esiste o è stata spostata. Torna alla home per scoprire i nostri servizi a Favignana.</p>
  <div class="btns">
    <a href="/" class="btn btn-primary">Torna alla Home</a>
    <a href="/contatti.html" class="btn btn-secondary">Contattaci</a>
  </div>
</body>
</html>
